services:
  mlflow:
    image: python:3.12-slim
    command: >
      sh -c "pip install --no-cache-dir mlflow==2.16.2 &&
             mlflow server
             --backend-store-uri sqlite:////mlflow/data/mlflow.db
             --default-artifact-root /mlflow/artifacts
             --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow/data
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 10

  train:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-recsys-movielens}
      - MLFLOW_REGISTRY_MODEL_NAME=${MLFLOW_REGISTRY_MODEL_NAME:-movielens-recommender}
      - RANDOM_SEED=${RANDOM_SEED:-42}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./metrics:/app/metrics
      - ./.dvc:/app/.dvc

volumes:
  mlflow_data:
  mlflow_artifacts:
